<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#151021" id="meta-theme" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>ASCENT · Bar Muscle-Up Campaign</title>
<style>
  /* ============ DUSK (night) ============ */
  :root, html[data-theme="dark"] {
    --bg: #151021;
    --bg2: #1c1530;
    --ink: #f2ead9;
    --mut: #a396b3;
    --ghost: #6a5f7d;
    --hair: rgba(242, 234, 217, .14);
    --hair2: rgba(242, 234, 217, .07);
    --amber: #ffb96b;
    --coral: #ff7e67;
    --sage: #a5d9ae;
    --gold: #e8c15c;
    --track: rgba(242, 234, 217, .10);
    --field: rgba(242, 234, 217, .05);
    --halo1: rgba(255, 158, 94, .14);
    --halo2: rgba(150, 92, 255, .12);
    --inkless: #151021;
  }
  /* ============ DAWN (day) ============ */
  html[data-theme="light"] {
    --bg: #f5efe3;
    --bg2: #ece4d3;
    --ink: #2b2136;
    --mut: #6f6480;
    --ghost: #a59cb1;
    --hair: rgba(43, 33, 54, .22);
    --hair2: rgba(43, 33, 54, .09);
    --amber: #b06a15;
    --coral: #bd4a33;
    --sage: #3d7d4e;
    --gold: #96762a;
    --track: rgba(43, 33, 54, .10);
    --field: rgba(43, 33, 54, .04);
    --halo1: rgba(224, 146, 60, .16);
    --halo2: rgba(140, 100, 220, .10);
    --inkless: #f5efe3;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overscroll-behavior-y: contain;
    transition: background-color .3s, color .3s;
  }
  body::before {
    content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background:
      radial-gradient(560px 420px at 50% -60px, var(--halo1), transparent 70%),
      radial-gradient(500px 500px at 110% 65%, var(--halo2), transparent 70%);
  }
  #root { min-height: 100vh; max-width: 520px; margin: 0 auto; padding: 0 22px 70px; }

  .serif { font-family: Georgia, "Times New Roman", "Songti SC", serif; }

  /* ============ MASTHEAD ============ */
  .mast { text-align: center; padding: 26px 0 8px; position: relative; }
  .mast .rule { height: 1px; background: var(--hair); margin: 12px 0 0; }
  .mast .rule.thin { margin-top: 3px; opacity: .5; }
  .word {
    font-family: Georgia, serif; font-style: italic; font-weight: 700;
    font-size: 34px; letter-spacing: .02em; margin: 0; cursor: pointer;
  }
  .word span { color: var(--amber); }
  .motto { font-size: 10px; letter-spacing: .34em; text-transform: uppercase; color: var(--ghost); margin-top: 6px; }
  .moon {
    position: absolute; right: 0; top: 30px; width: 34px; height: 34px;
    border: 1px solid var(--hair); border-radius: 50%; background: transparent;
    color: var(--amber); font-size: 15px; cursor: pointer; line-height: 1;
  }
  .moon.left { right: 44px; }
  .moon.wt { right: 88px; font-family: Georgia, serif; font-style: italic; font-size: 12px; }
  .menu { display: flex; justify-content: center; gap: 26px; padding: 12px 0; }
  .menu a {
    font-size: 10.5px; letter-spacing: .26em; text-transform: uppercase;
    color: var(--mut); cursor: pointer; text-decoration: none; padding-bottom: 3px;
    border-bottom: 2px solid transparent;
  }
  .menu a.on { color: var(--ink); border-bottom-color: var(--amber); }

  /* ============ EDITORIAL HEADINGS ============ */
  .chap { margin: 34px 0 6px; text-align: center; }
  .chap .no { font-family: Georgia, serif; font-style: italic; font-size: 13px; color: var(--amber); }
  .chap h3 {
    font-family: Georgia, serif; font-size: 21px; font-weight: 700; margin: 2px 0 0; letter-spacing: .01em;
  }
  .chap .dek { font-size: 11.5px; color: var(--mut); margin-top: 5px; line-height: 1.6; }
  .flourish { text-align: center; color: var(--ghost); font-size: 13px; letter-spacing: .6em; margin: 6px 0 10px; }

  /* ============ ORBIT DIAL ============ */
  .dial-wrap { position: relative; width: 264px; margin: 8px auto 2px; }
  .dial-wrap svg { display: block; width: 100%; height: auto; }
  .dial-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
  .dial-big { font-family: Georgia, serif; font-size: 44px; font-weight: 700; line-height: 1; }
  .dial-big small { font-size: 18px; color: var(--ghost); font-weight: 400; }
  .dial-mode { font-size: 9.5px; letter-spacing: .3em; text-transform: uppercase; color: var(--amber); margin-top: 7px; }
  .dial-min { font-size: 10.5px; color: var(--ghost); margin-top: 3px; font-style: italic; font-family: Georgia, serif; }

  .orbits { display: flex; justify-content: center; gap: 10px; margin: 14px 0 4px; }
  .orbit {
    border: 1px solid var(--hair); background: transparent; color: var(--mut);
    font-family: Georgia, serif; font-style: italic; font-size: 12.5px;
    padding: 7px 15px; border-radius: 99px; cursor: pointer;
  }
  .orbit.on { border-color: var(--amber); color: var(--amber); }

  /* ============ MANIFEST (legend list) ============ */
  .mani { margin-top: 14px; }
  .mi { display: flex; align-items: baseline; gap: 10px; padding: 10px 2px; cursor: pointer; border-bottom: 1px solid var(--hair2); }
  .mi:last-child { border-bottom: none; }
  .mi .n {
    font-family: Georgia, serif; font-style: italic; font-size: 15px; color: var(--amber);
    width: 22px; flex-shrink: 0; text-align: right;
  }
  .mi.done .n { color: var(--sage); }
  .mi .t { font-size: 13px; font-weight: 600; }
  .mi .leader { flex: 1; border-bottom: 1px dotted var(--hair); transform: translateY(-3px); min-width: 14px; }
  .mi .m { font-size: 11px; color: var(--ghost); flex-shrink: 0; font-style: italic; font-family: Georgia, serif; }
  .mi.done .t { color: var(--ghost); text-decoration: line-through; text-decoration-color: var(--sage); text-decoration-thickness: 1.5px; }
  .mi .cue { display: none; }
  .mi.open .cue { display: block; font-size: 11px; color: var(--mut); line-height: 1.6; margin-top: 4px; }
  .mi .body { flex: 1; min-width: 0; display: flex; flex-wrap: wrap; align-items: baseline; gap: 0 10px; }
  .mi .body .cue { flex-basis: 100%; }

  /* ============ ASIDES (marginalia) ============ */
  .aside {
    font-family: Georgia, serif; font-style: italic; font-size: 12.5px; line-height: 1.7;
    color: var(--mut); padding: 4px 0 4px 16px; border-left: 2px solid var(--amber); margin: 18px 2px;
  }
  .aside.grave { border-left-color: var(--coral); }
  .aside.laurel { border-left-color: var(--sage); }
  .aside b { color: var(--ink); font-style: normal; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 11.5px; }

  /* ============ DIAMOND GRID ============ */
  .constellation { display: grid; grid-template-columns: repeat(3, 1fr); gap: 34px 14px; padding: 26px 8px 16px; }
  .dia { position: relative; aspect-ratio: 1; cursor: pointer; }
  .dia .shape {
    position: absolute; inset: 12%; transform: rotate(45deg);
    border: 1.5px solid var(--hair); background: var(--field);
    transition: border-color .2s, background .2s;
  }
  .dia:active .shape { border-color: var(--amber); }
  .dia.done .shape { background: var(--sage); border-color: var(--sage); }
  .dia .inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  .dia .glyph { font-family: Georgia, serif; font-style: italic; font-size: 19px; color: var(--amber); line-height: 1; }
  .dia.done .glyph, .dia.done .lbl { color: var(--inkless); }
  .dia .lbl { font-size: 8.5px; letter-spacing: .18em; text-transform: uppercase; font-weight: 700; margin-top: 5px; color: var(--ink); }
  .dia .und { position: absolute; left: 50%; transform: translateX(-50%); bottom: -21px; white-space: nowrap; font-size: 8.5px; color: var(--ghost); letter-spacing: .08em; font-style: italic; font-family: Georgia, serif; }

  /* ============ GAUGES ============ */
  .gauges { display: flex; justify-content: center; gap: 34px; margin: 10px 0 4px; }
  .gauge { position: relative; width: 118px; }
  .gauge svg { display: block; width: 100%; height: auto; }
  .gauge .mid { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .gauge .gv { font-family: Georgia, serif; font-size: 26px; font-weight: 700; line-height: 1; }
  .gauge .gv small { font-size: 13px; color: var(--ghost); font-weight: 400; }
  .gauge .gl { font-size: 8.5px; letter-spacing: .24em; text-transform: uppercase; color: var(--ghost); margin-top: 5px; }

  /* ============ NUMBERED EXERCISE LITANY ============ */
  .lit { counter-reset: lit; }
  .li { display: flex; gap: 13px; padding: 13px 2px; border-bottom: 1px solid var(--hair2); cursor: pointer; }
  .li .n { font-family: Georgia, serif; font-style: italic; font-size: 17px; color: var(--amber); width: 26px; flex-shrink: 0; text-align: right; line-height: 1.2; }
  .li.done .n { color: var(--sage); }
  .li .w { flex: 1; min-width: 0; }
  .li .t { font-size: 13.5px; font-weight: 700; line-height: 1.35; }
  .li.done .t { color: var(--ghost); text-decoration: line-through; text-decoration-color: var(--sage); text-decoration-thickness: 1.5px; }
  .li .d { font-family: Georgia, serif; font-style: italic; font-size: 12px; color: var(--amber); margin-top: 3px; }
  .li .x { font-size: 11px; color: var(--mut); margin-top: 4px; line-height: 1.6; }

  /* ============ FORMS: underline fields ============ */
  .fld { display: block; font-size: 9px; color: var(--ghost); margin: 16px 0 2px; font-weight: 700; text-transform: uppercase; letter-spacing: .26em; }
  input[type="number"], input[type="text"], select {
    width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--hair);
    color: var(--ink); padding: 8px 2px; font-size: 15px; border-radius: 0;
    font-family: Georgia, serif; font-style: italic; -webkit-appearance: none; appearance: none;
  }
  input:focus, select:focus { outline: none; border-bottom-color: var(--amber); }
  ::placeholder { color: var(--ghost); }

  .act {
    display: inline-block; background: transparent; border: 1px solid var(--amber); color: var(--amber);
    font-family: Georgia, serif; font-style: italic; font-size: 14px; padding: 9px 26px;
    border-radius: 99px; cursor: pointer; margin-top: 18px;
  }
  .act.solid { background: var(--amber); color: var(--inkless); font-weight: 700; }
  .act.wide { display: block; width: 100%; text-align: center; }

  /* ============ TIMER ============ */
  .tring { position: relative; width: 190px; margin: 14px auto 4px; }
  .tring svg { display: block; width: 100%; height: auto; }
  .tring .mid { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .tring .tv { font-family: Georgia, serif; font-size: 52px; font-weight: 700; line-height: 1; }
  .tring .tp { font-size: 9px; letter-spacing: .38em; text-transform: uppercase; color: var(--mut); margin-top: 6px; }
  .tsub { text-align: center; font-size: 11px; color: var(--ghost); font-style: italic; font-family: Georgia, serif; margin-top: 8px; }
  .tbtns { display: flex; gap: 12px; justify-content: center; }

  /* ============ MISC ============ */
  .kv { width: 100%; border-collapse: collapse; }
  .kv td { padding: 9px 2px; border-bottom: 1px solid var(--hair2); font-size: 12px; color: var(--mut); line-height: 1.65; vertical-align: top; }
  .kv td.k { font-family: Georgia, serif; font-style: italic; color: var(--amber); font-size: 13px; white-space: nowrap; padding-right: 14px; }
  .kv tr:last-child td { border-bottom: none; }

  .creed { margin: 8px 0; }
  .creed p { font-size: 12.5px; color: var(--mut); line-height: 1.75; margin: 0 0 12px; padding-left: 16px; text-indent: -16px; }
  .creed p::before { content: '❧ '; color: var(--amber); }
  .creed p b { color: var(--ink); }

  .hrow { display: flex; justify-content: space-between; gap: 10px; padding: 10px 2px; border-bottom: 1px solid var(--hair2); font-size: 13px; }
  .hrow:last-child { border-bottom: none; }
  .hrow .d { color: var(--ghost); font-size: 11px; font-style: italic; font-family: Georgia, serif; white-space: nowrap; }

  .crumb { font-family: Georgia, serif; font-style: italic; font-size: 14px; color: var(--amber); cursor: pointer; padding: 20px 0 4px; display: inline-block; }
  .sess-head { text-align: center; margin: 6px 0 2px; }
  .sess-head .ord { font-size: 10px; letter-spacing: .34em; text-transform: uppercase; color: var(--ghost); }
  .sess-head h3 { font-family: Georgia, serif; font-size: 24px; margin: 6px 0 4px; line-height: 1.25; }
  .sess-head .meta { font-family: Georgia, serif; font-style: italic; font-size: 12.5px; color: var(--mut); }
  .fin { text-align: center; color: var(--ghost); font-family: Georgia, serif; font-style: italic; font-size: 12px; margin: 26px 0 8px; }
</style>
</head>
<body>
<div id="root"></div>

<script>
  window.addEventListener('error', function (e) {
    var root = document.getElementById('root');
    if (root && !root.innerHTML.trim()) {
      root.innerHTML = '<div style="padding:24px;line-height:1.5;font-family:Georgia,serif"><h2 style="font-style:italic">The page stumbled.</h2><p style="opacity:.7">' + (e.message || 'Unknown error') + '</p><p style="opacity:.5;font-size:12px;">Line ' + (e.lineno || '?') + '</p></div>';
    }
  });
</script>

  var SESSION_ORDER = ['climbA', 'strengthA', 'move', 'climbB', 'strengthB'];

        '<span class="n" onclick="app.peek(\'' + it.id + '\')">' + (i + 1) + '</span>' +
        '<div class="body" onclick="app.toggleDaily(\'' + it.id + '\')">' +
        '<span class="t">' + it.name + '</span><span class="leader"></span><span class="m">' + it.target + '</span>' +
        '<div class="cue">' + it.cue + '</div>' +
        '</div></div>';
    }
    h += '</div>';

    if (rs.complete) h += '<div class="aside laurel"><b>Rite complete.</b> A routine you enjoy, done daily, is worth more than a perfect one done sometimes.</div>';
    h += '<div class="aside grave"><b>The 24-hour rule.</b> Anything provoked must settle within minutes, and you must be no worse next morning. Worse next morning → halve slider volume for 3–5 days. Symptoms creeping down the leg → back off, book the physio.</div>';

    h += chap('¶ the constellation', 'Five sessions, two rests', getMode() === 'park' ? 'On the road — the climbing slots run as park sessions. Tap the ⛰ up top when you’re home again.' : 'Any order that honors the spacing rules. Tap a diamond to open its page. The Π up top switches the week to calisthenics-park mode.');

    var w = getWeek(weekKey());
    h += '<div class="constellation">';
    for (var j = 0; j < SESSION_ORDER.length; j++) {
      var key = SESSION_ORDER[j], s = sessionFor(key), doneDate = w.sessions[key];
      h += '<div class="dia' + (doneDate ? ' done' : '') + '" onclick="app.openSession(\'' + key + '\')">' +
        '<div class="shape"></div><div class="inner">' +
        '<span class="glyph">' + s.glyph + '</span><span class="lbl">' + s.short + '</span>' +
        '</div><span class="und">' + (doneDate ? 'done ' + doneDate.slice(5) : s.und) + '</span></div>';
    }
    h += '<div class="dia"><div class="shape" style="border-style:dashed;background:transparent"></div><div class="inner">' +
      '<span class="glyph" style="color:var(--ghost)">Ⅵ·Ⅶ</span><span class="lbl" style="color:var(--ghost)">Rest ×2</span>' +
      '</div><span class="und">sacred, not lazy</span></div>';
    h += '</div>';

    h += '<div class="fin">— run the week, then read the Ledger —</div>';
    return h;
  }

  // ================= WEEK =================

  function renderWeek() {
    var wk = weekKey();
    var done = sessionsDoneThisWeek();
    var rd = routineDaysThisWeek();
    var h = masthead('week');

    h += chap('¶ the tally', 'Week ' + wk.split('W')[1] + ', ' + wk.slice(0, 4), 'A recipe, not a calendar.');
    h += '<div class="gauges">' + gaugeHTML(done, 5, 'sessions') + gaugeHTML(rd, 7, 'rite days') + '</div>';

    h += chap('¶ the law of spacing', 'Order is free, spacing is not');
    h += '<div class="creed">';
    SPACING_RULES.forEach(function (r) { h += '<p>' + r + '</p>'; });
    h += '</div>';

    var ci = getCheckins()[wk] || {};
    h += chap('¶ the sunday audit', 'Two minutes, once a week', 'Counts above are kept automatically.');
    h += '<label class="fld">Sciatic, against last week</label>' +
      '<select id="ci-sciatic"><option value="">—</option>' +
      ['better', 'same', 'worse'].map(function (o) { return '<option' + (ci.sciatic === o ? ' selected' : '') + '>' + o + '</option>'; }).join('') +
      '</select>' +
      '<label class="fld">Best pull-up set · best boulder or park feat</label>' +
      '<input type="text" id="ci-best" value="' + esc(ci.best || '') + '" placeholder="e.g. 5×6 strict · red V5 overhang" />' +
      '<label class="fld">One adjustment for next week</label>' +
      '<input type="text" id="ci-adjust" value="' + esc(ci.adjust || '') + '" placeholder="e.g. move Strength A to Tuesday" />' +
      '<div style="text-align:center"><button class="act solid" onclick="app.saveCheckin()">Record the audit</button>' +
      (ci.savedAt ? '<div class="fin">recorded ' + ci.savedAt + '</div>' : '') + '</div>';

    var streak = worseStreak();
    if (streak >= 2) h += '<div class="aside grave"><b>Sciatic “worse” ' + streak + ' weeks running.</b> This is the week you book the physio. That assessment is the highest-value action in the whole plan.</div>';

    h += '<div class="fin">❦</div>';
    return h;
  }

  function worseStreak() {
    var cis = getCheckins();
    var keys = Object.keys(cis).sort().reverse();
    var streak = 0;
    for (var i = 0; i < keys.length; i++) {
      if (cis[keys[i]].sciatic === 'worse') streak++;
      else break;
    }
    return streak;
  }

  // ================= SESSION PAGE =================

  function litany(items, key, prefix, w) {
    var h = '<div class="lit">';
    for (var i = 0; i < items.length; i++) {
      var id = key + '-' + prefix + i;
      var done = !!w.checks[id];
      var it = rit(items[i]);
      h += '<div class="li' + (done ? ' done' : '') + '" onclick="app.toggleCheck(\'' + id + '\')">' +
        '<span class="n">' + (i + 1) + '</span><div class="w">' +
        '<div class="t">' + it.name + '</div>' +
        (it.target ? '<div class="d">' + it.target + '</div>' : '') +
        (it.notes ? '<div class="x">' + it.notes + '</div>' : '') +
        '</div></div>';
    }
    return h + '</div>';
  }

  function renderSession(key) {
    var s = sessionFor(key);
    var pfx = (getMode() === 'park' && PARK[key]) ? 'p' : '';
    var wk = weekKey();
    var w = getWeek(wk);
    var doneDate = w.sessions[key];
    var idx = SESSION_ORDER.indexOf(key) + 1;

    var h = '<span class="crumb" onclick="app.closeSession()">‹ back to the day</span>';
    h += '<div class="sess-head">' +
      '<div class="ord">Session ' + s.glyph + ' — ' + (s.hard ? 'a hard day' : 'a light day') + '</div>' +
      '<h3>' + s.title + '</h3>' +
      '<div class="meta">' + s.duration + ' · ' + s.type + '</div>' +
      '</div><div class="flourish">· · ·</div>';

    if (s.warmup) {
      h += chap('i.', 'The warm-up');
      h += litany(s.warmup, key, pfx + 'w', w);
    }

    if (key === 'strengthA') {
      var block = getBlock();
      h += chap('ii.', 'The movement', 'Progress by criteria, never by calendar.');
      h += '<div class="orbits">';
      ['1', '2', '3'].forEach(function (b) {
        h += '<button class="orbit' + (block === b ? ' on' : '') + '" onclick="app.setBlock(\'' + b + '\')">' +
          ['Ⅰ', 'Ⅱ', 'Ⅲ'][parseInt(b) - 1] + '</button>';
      });
      h += '</div>';
      var bl = BLOCKS[block];
      h += '<div class="dek" style="text-align:center;color:var(--mut);font-size:12px;font-family:Georgia,serif;font-style:italic">' + bl.label + '</div>';
      h += litany(bl.items, key, 'b' + block, w);

      if (bl.cues) {
        h += chap('iii.', 'Cues for every attempt');
        h += '<div class="creed">';
        bl.cues.forEach(function (c) { h += '<p>' + c + '</p>'; });
        h += '</div>';
      }

      h += chap(bl.cues ? 'iv.' : 'iii.', 'The gate to Movement ' + (parseInt(block) < 3 ? ['Ⅱ', 'Ⅲ'][parseInt(block) - 1] : '— the rep itself'));
      var crit = getCriteria();
      h += '<div class="lit">';
      bl.exit.forEach(function (c, i) {
        var done = !!crit[c.id];
        h += '<div class="li' + (done ? ' done' : '') + '" onclick="app.toggleCriterion(\'' + c.id + '\')">' +
          '<span class="n">' + (done ? '✦' : '·') + '</span><div class="w"><div class="t">' + c.label + '</div></div></div>';
      });
      h += '</div>';
      h += '<div class="aside">Baseline test in week one, retest every 4 weeks: AMRAP strict pull-ups, rest 5 minutes, AMRAP full-range dips — logged in the Ledger. Honest timeline from 5×5: first strict bar muscle-up in <b>3–6 months</b>.</div>';
    }

    if (s.hangboard) {
      h += chap('ii.', s.gripTitle || 'The hangboard', s.gripDek || '20mm edge, submax repeaters. Three sets per grip — half-crimp, then open-hand. RPE 6–7.');
      h += timerHTML();
    }

    if (s.options) {
      h += chap('ii.', 'This week’s focus', 'Rotate weekly.');
      h += '<div class="creed">';
      s.options.forEach(function (o) { o = rit(o); h += '<p><b>' + o.name + ':</b> ' + o.detail + '</p>'; });
      h += '</div>';
    }

    if (s.main) {
      h += chap(s.hangboard || s.options ? 'iii.' : (s.warmup ? 'ii.' : 'i.'), 'The main work');
      h += litany(s.main, key, pfx + 'm', w);
    }
    if (s.finisher) {
      h += chap('iv.', 'The finisher');
      h += litany(s.finisher, key, pfx + 'f', w);
    }

    if (s.rules) h += '<div class="aside grave"><b>While symptomatic:</b> ' + s.rules + '</div>';
    if (s.closing) h += '<div class="aside laurel">' + s.closing + '</div>';

    h += '<div style="text-align:center;margin-top:22px">';
    h += doneDate
      ? '<button class="act" onclick="app.toggleSessionDone(\'' + key + '\')">Unmark — done ' + doneDate + '</button>'
      : '<button class="act solid wide" onclick="app.toggleSessionDone(\'' + key + '\')">Seal the session</button>';
    h += '</div><div class="fin">❦</div>';
    return h;
  }

  // ================= LEDGER (progress) =================

  function renderProgress() {
    var tests = getTests();
    var last = tests.length ? tests[tests.length - 1] : null;
    var h = masthead('progress');

    h += chap('¶ the ledger', 'Strength, entered monthly', 'Every 4 weeks: AMRAP strict pull-ups, rest 5 minutes, AMRAP full-range dips. Same conditions every time.');

    if (last) {
      var days = Math.round((new Date() - new Date(last.date)) / 86400000);
      h += days >= 28
        ? '<div class="aside grave"><b>Retest due.</b> The last entry is ' + days + ' days old.</div>'
        : '<div class="aside">Last entry ' + days + ' days ago; the next falls due in ' + (28 - days) + '.</div>';
    } else {
      h += '<div class="aside grave"><b>No baseline yet.</b> Week one: enter your AMRAP pull-ups and dips below.</div>';
    }

    h += '<label class="fld">Strict pull-ups, one set to honest failure</label><input type="number" id="test-pu" inputmode="numeric" placeholder="e.g. 8" />' +
      '<label class="fld">Full-range dips, one set to honest failure</label><input type="number" id="test-dips" inputmode="numeric" placeholder="e.g. 10" />' +
      '<div style="text-align:center"><button class="act solid" onclick="app.saveTest()">Enter into the ledger</button></div>';

    if (tests.length) {
      h += chap('¶ prior entries', 'The record so far');
      for (var i = tests.length - 1; i >= 0; i--) {
        var t = tests[i];
        var deltaP = i > 0 ? t.pullups - tests[i - 1].pullups : 0;
        var deltaD = i > 0 ? t.dips - tests[i - 1].dips : 0;
        var d = function (x) { return x > 0 ? ' <span style="color:var(--sage)">+' + x + '</span>' : (x < 0 ? ' <span style="color:var(--coral)">' + x + '</span>' : ''); };
        h += '<div class="hrow"><span>' + t.pullups + ' pull-ups' + (i > 0 ? d(deltaP) : '') + ' · ' + t.dips + ' dips' + (i > 0 ? d(deltaD) : '') + '</span><span class="d">' + t.date + '</span></div>';
      }
    }

    var crit = getCriteria();
    h += chap('¶ the gates', 'Milestones toward the rep');
    h += '<div class="gauges" style="flex-wrap:wrap">';
    ['1', '2', '3'].forEach(function (b) {
      var bl = BLOCKS[b];
      var doneN = bl.exit.filter(function (c) { return crit[c.id]; }).length;
      h += gaugeHTML(doneN, bl.exit.length, 'movement ' + ['Ⅰ', 'Ⅱ', 'Ⅲ'][parseInt(b) - 1]);
    });
    h += '</div>';

    var cis = getCheckins();
    var keys = Object.keys(cis).sort().reverse();
    if (keys.length) {
      h += chap('¶ sunday audits', 'The weekly word');
      keys.slice(0, 8).forEach(function (k) {
        var c = cis[k];
        var col = c.sciatic === 'better' ? 'var(--sage)' : (c.sciatic === 'worse' ? 'var(--coral)' : 'var(--mut)');
        h += '<div class="hrow"><span>' + k + ' — <span style="color:' + col + ';font-style:italic;font-family:Georgia,serif">' + (c.sciatic || '—') + '</span>' + (c.best ? ' · ' + esc(c.best) : '') + '</span></div>';
      });
    }
    h += '<div class="fin">❦</div>';
    return h;
  }

  // ================= CODEX (reference) =================

  function renderInfo() {
    var h = masthead('info');

    h += chap('¶ the codex', 'Training Plan, Volume III', 'Set down in July 2026.');

    h += '<div class="aside grave"><b>Do this first: get the leg assessed.</b> One physio visit (€30–80) tells us if it’s nerve sensitization (sliders help), deep gluteal syndrome (different loading), or proximal hamstring tendinopathy (stretching makes it worse — it needs loading). Until then the plan assumes nerve sensitization and stays conservative.<br><br><b>Red flags:</b> ' + RED_FLAGS + '</div>';

    h += chap('¶ on travel', 'The plan travels with you');
    h += '<div class="aside">' + TRAVEL_NOTE + '<br><br>Why this works: the muscle-up campaign was always bar-built — a calisthenics park <b>is</b> the equipment, so Strength A and B run abroad without a single substitution. The one thing no park replaces is plastic: route reading, footwork, limit moves on real holds. Park A keeps grip and body tension warm — towel hangs, archer pulls, front-lever rows — so the strength survives the trip and the skill sharpens back up within a session or two at home. Trips under 5 days cost essentially nothing anyway; detraining in trained lifters barely begins inside two weeks.</div>';

    h += chap('¶ the table', 'Nutrition, kept simple');
    h += '<table class="kv">';
    NUTRITION.forEach(function (n) { h += '<tr><td class="k">' + n.k + '</td><td>' + n.v + '</td></tr>'; });
    h += '</table>';

    h += chap('¶ on regulation', 'When the day resists');
    h += '<div class="creed">';
    AUTOREG.forEach(function (a) { h += '<p>' + a + '</p>'; });
    h += '</div>';

    h += chap('¶ first principles', 'Why the plan is shaped this way');
    h += '<div class="creed">' +
      '<p><b>Adherence beats completeness — and travel is the known failure mode, not motivation.</b> The full morning rite stays because you enjoy it; fallback tiers make interruptions degrade the plan instead of breaking it.</p>' +
      '<p><b>The sciatic issue is the actual bottleneck</b>, not pulling strength. It holds the non-negotiable slot in every tier.</p>' +
      '<p><b>Bar muscle-up path only.</b> No false-grip work. Explosive pulling starts in week one.</p>' +
      '</div>';

    h += chap('¶ the armory', 'Two purchases worth their price');
    h += '<div class="creed">' +
      '<p>A <b>€25 dip belt</b> — the single best purchase for this goal (loading pull-ups and dips).</p>' +
      '<p>A <b>€15 medium resistance band</b> — the best bridge from Movement Ⅱ to the first strict rep.</p>' +
      '<p>Until the belt arrives: the <b>bw</b> toggle in the masthead swaps every loaded exercise for a band or leverage progression — nothing in this plan requires a single kilo of iron.</p>' +
      '</div>';

    h += chap('¶ struck from volume ii', 'And why');
    h += '<div class="creed">' +
      '<p>False-grip everything — a ring-MU tool; you’re training a bar MU on a bar.</p>' +
      '<p>Mandatory 5–7 workday micro-doses — now optional; the morning rite and warm-up sliders carry the dose.</p>' +
      '<p>Carb cycling — complexity without payoff.</p>' +
      '<p>The biweekly test battery — a monthly AMRAP is signal enough.</p>' +
      '<p>Nordic curls, Jefferson curls, pancake work — paused while symptomatic; a physio’s green light brings them back.</p>' +
      '<p><b>Restored:</b> the 22-minute morning rite — cut in an earlier draft, brought back because you enjoy it, and enjoyment is the best adherence predictor there is.</p>' +
      '</div>';

    h += '<div class="aside laurel"><b>Doctrine.</b> Criteria over calendar · heavy days honest, light days flexible · adherence over months is the entire game.</div>';
    h += '<div class="fin">❦ finis ❦</div>';
    return h;
  }

  // ================= RENDER + APP =================

  function render() {
    var h = '';
    if (view.session) h = renderSession(view.session);
    else if (view.page === 'home') h = renderHome();
    else if (view.page === 'week') h = renderWeek();
    else if (view.page === 'progress') h = renderProgress();
    else h = renderInfo();
    document.getElementById('root').innerHTML = h;
  }

  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    var meta = document.getElementById('meta-theme');
    if (meta) meta.setAttribute('content', t === 'light' ? '#f5efe3' : '#151021');
    save('theme', t);
  }
  (function initTheme() {
    var saved = load('theme', null);
    if (!saved) {
      try { saved = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'; }
      catch (e) { saved = 'dark'; }
    }
    applyTheme(saved);
  })();

  window.app = {
    go: function (p) { view.page = p; view.session = null; openCue = null; stopHangTimer(); render(); window.scrollTo(0, 0); },
    openSession: function (k) { view.session = k; render(); window.scrollTo(0, 0); },
    closeSession: function () { view.session = null; stopHangTimer(); render(); },

    toggleTheme: function () {
      var cur = document.documentElement.getAttribute('data-theme');
      applyTheme(cur === 'light' ? 'dark' : 'light');
      render();
    },

    toggleLoc: function () {
      setModeStore(getMode() === 'park' ? 'climb' : 'park');
      stopHangTimer();
      render();
      window.scrollTo(0, 0);
    },

    toggleWt: function () {
      setWeightsStore(getWeights() === 'bw' ? 'kg' : 'bw');
      render();
    },

    peek: function (id) { openCue = openCue === id ? null : id; render(); },

    setRoutineMode: function (m) {
      var date = todayKey(), day = getDay(date);
      day.mode = m;
      setDay(date, day);
      render();
    },
    toggleDaily: function (id) {
      var date = todayKey(), day = getDay(date);
      day[id] = !day[id];
      if (!day.mode) day.mode = 'full';
      setDay(date, day);
      render();
    },
    toggleCheck: function (id) {
      var wk = weekKey(), w = getWeek(wk);
      w.checks[id] = !w.checks[id];
      setWeek(wk, w);
      render();
    },
    toggleSessionDone: function (k) {
      var wk = weekKey(), w = getWeek(wk);
      w.sessions[k] = w.sessions[k] ? null : todayKey();
      setWeek(wk, w);
      render();
    },
    setBlock: function (b) { setBlockStore(b); render(); },
    toggleCriterion: function (id) {
      var c = getCriteria();
      c[id] = !c[id];
      setCriteria(c);
      render();
    },
    saveTest: function () {
      var pu = parseInt(document.getElementById('test-pu').value, 10);
      var dips = parseInt(document.getElementById('test-dips').value, 10);
      if (isNaN(pu) || isNaN(dips)) { alert('Enter both numbers.'); return; }
      var t = getTests();
      t.push({ date: todayKey(), pullups: pu, dips: dips });
      setTests(t);
      render();
    },
    saveCheckin: function () {
      var wk = weekKey();
      var cis = getCheckins();
      cis[wk] = {
        sciatic: document.getElementById('ci-sciatic').value,
        best: document.getElementById('ci-best').value,
        adjust: document.getElementById('ci-adjust').value,
        sessions: sessionsDoneThisWeek(),
        routineDays: routineDaysThisWeek(),
        savedAt: todayKey()
      };
      setCheckins(cis);
      render();
    },
    timerStart: startHangTimer,
    timerStop: function () { stopHangTimer(); renderTimerOnly(); },
    timerReset: function () { stopHangTimer(); timer.set = 1; timer.phase = 'idle'; renderTimerOnly(); }
  };

  render();
</script>
</body>
</html>
