<!DOCTYPE html>

<head>
<meta charset="UTF-8" />

<title>Training Tracker</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #0a0a0a; color: #e5e5e5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overscroll-behavior-y: contain; }
  #root { min-height: 100vh; padding-bottom: 88px; }

  .checkbox-row { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border-radius: 10px; background: #161616; margin-bottom: 8px; cursor: pointer; transition: background .15s; border: 1px solid #222; }
  .checkbox-row:active { background: #1c1c1c; }
  .checkbox-row.done { background: #0f1f0f; border-color: #1f3f1f; }
  .checkbox-row.done .check-text { color: #666; text-decoration: line-through; }
  .check-circle { flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; border: 2px solid #444; display: flex; align-items: center; justify-content: center; margin-top: 2px; transition: all .15s; }
  .check-circle.done { background: #22c55e; border-color: #22c55e; }
  .check-circle.done svg { display: block; }
  .check-circle svg { display: none; }

  .block-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; cursor: pointer; user-select: none; background: #0f0f0f; border: 1px solid #1f1f1f; border-radius: 10px; }

  .tab-button { flex: 1; padding: 14px 8px; background: transparent; border: none; color: #888; font-size: 12px; font-weight: 600; cursor: pointer; transition: color .15s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .tab-button.active { color: var(--accent); }
  .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #0a0a0a; border-top: 1px solid #222; display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }

  .number-button { width: 48px; height: 48px; border-radius: 50%; background: #1c1c1c; border: 1px solid #333; color: #fff; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .number-button:active { background: #2c2c2c; }

  .slider-pip { width: 32px; height: 32px; border-radius: 50%; background: #1c1c1c; border: 2px solid #333; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #555; transition: all .2s; }
  .slider-pip.filled { background: var(--accent); border-color: var(--accent); color: #fff; }

  textarea, input, select { font-family: inherit; }
  textarea:focus, input:focus, select:focus { outline: 2px solid var(--accent); outline-offset: -1px; }

  .icon { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .icon-sm { width: 12px; height: 12px; }
  .icon-lg { width: 18px; height: 18px; }
</style>
</head>

<script>
  // iOS Safari error fallback - shows what broke if the app fails to load
  window.addEventListener('error', function(e) {
    var root = document.getElementById('root');
    if (root && !root.innerHTML.trim()) {
      root.innerHTML = '<div style="padding:24px;color:#f87171;font-family:system-ui;line-height:1.5;"><h2>App failed to load</h2><p style="color:#aaa">' + (e.message || 'Unknown error') + '</p><p style="color:#888;font-size:12px;margin-top:16px;">Line: ' + (e.lineno || '?') + ', Col: ' + (e.colno || '?') + '</p><p style="color:#888;font-size:12px;margin-top:8px;">If you opened this from the Files app on iPhone, try one of these instead:<br>1. Email it to yourself, open from email<br>2. Upload to GitHub Pages, Netlify Drop, or any web host<br>3. Host on iCloud Drive and open via the iCloud.com web interface</p></div>';
    }
  });
</script>

  // Parse rest strings like "60s", "2 min", "2-3 min" into seconds (use upper bound for ranges)
  // Parse number of sets from a target string: "3 sets" -> 3, "4-5 × 3-5" -> 4, "3 × 8-10" -> 3
  function parseSetCount(targetStr) {
    if (!targetStr) return 0;
    var s = targetStr.toLowerCase().trim();
    // "3 sets" / "5 sets"
    var setsMatch = s.match(/(\d+)\s*sets?/);
    if (setsMatch) return parseInt(setsMatch[1]);
    // "4-5 × 3-5" or "3 × 8-10" — first number (or upper of first range) before the ×
    var beforeX = s.split(/[×x]/)[0];
    if (beforeX !== s) {
      var rangeMatch = beforeX.match(/(\d+)\s*-\s*(\d+)/);
      if (rangeMatch) return parseInt(rangeMatch[2]);  // use upper bound
      var single = beforeX.match(/(\d+)/);
      if (single) return parseInt(single[1]);
    }
    return 0;
  }

  // Parse the per-set work duration if the target encodes one, e.g. "3 × 20-30s" -> 30, "3 × 15s" -> 15
  function parseSetWorkSeconds(targetStr) {
    if (!targetStr) return 0;
    var s = targetStr.toLowerCase();
    // look for a seconds value AFTER the × sign
    var afterX = s.split(/[×x]/)[1];
    if (!afterX) return 0;
    var rangeMatch = afterX.match(/(\d+)\s*-\s*(\d+)\s*s/);
    if (rangeMatch) return parseInt(rangeMatch[2]);
    var secMatch = afterX.match(/(\d+)\s*s/);
    if (secMatch) return parseInt(secMatch[1]);
    return 0;
  }

  function parseRestToSeconds(restStr) {
    if (!restStr) return 0;
    var s = restStr.toLowerCase().trim();
    // Handle ranges like "2-3 min" - take the upper number
    var rangeMatch = s.match(/(\d+)\s*-\s*(\d+)\s*min/);
    if (rangeMatch) return parseInt(rangeMatch[2]) * 60;
    var minMatch = s.match(/(\d+(?:\.\d+)?)\s*min/);
    if (minMatch) return Math.round(parseFloat(minMatch[1]) * 60);
    var secMatch = s.match(/(\d+)\s*s/);
    if (secMatch) return parseInt(secMatch[1]);
    return 0;
  }

  function formatSeconds(s) {
    if (s < 60) return s + 's';
    var m = Math.floor(s / 60);
    var rem = s % 60;
    return rem === 0 ? m + ':00' : m + ':' + String(rem).padStart(2, '0');
  }

  const todayKey = () => {

    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  };
  const dayName = () => DAYS[new Date().getDay()];

  const STORAGE_KEY_PREFIX = 'training-tracker-';

  function loadDay(date) {
    try {
      const raw = localStorage.getItem(`${STORAGE_KEY_PREFIX}day-${date}`);
      return raw ? JSON.parse(raw) : null;
    } catch { return null; }
  }
  function saveDay(date, data) {
    try { localStorage.setItem(`${STORAGE_KEY_PREFIX}day-${date}`, JSON.stringify(data)); } catch (e) { console.error(e); }
  }
  function loadWeekly() {
    try {
      const raw = localStorage.getItem(`${STORAGE_KEY_PREFIX}weekly`);
      return raw ? JSON.parse(raw) : { entries: [] };
    } catch { return { entries: [] }; }
  }
  function saveWeekly(data) {
    try { localStorage.setItem(`${STORAGE_KEY_PREFIX}weekly`, JSON.stringify(data)); } catch (e) { console.error(e); }
  }

  // Load persistent weights (cross-day) from localStorage
  function loadWeights() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY_PREFIX + 'weights');
      return raw ? JSON.parse(raw) : {};
    } catch (e) { return {}; }
  }
  function saveWeights(w) {
    try { localStorage.setItem(STORAGE_KEY_PREFIX + 'weights', JSON.stringify(w)); } catch (e) {}
  }

  function loadWeightHistory() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY_PREFIX + 'weightHistory');
      return raw ? JSON.parse(raw) : {};
    } catch (e) { return {}; }
  }
  function saveWeightHistory(h) {
    try { localStorage.setItem(STORAGE_KEY_PREFIX + 'weightHistory', JSON.stringify(h)); } catch (e) {}
  }
  function recordWeightHistory(id, value) {
    if (!value || isNaN(parseFloat(value))) return;
    var hist = state.weightHistory;
    if (!hist[id]) hist[id] = [];
    var today = todayKey();
    // Replace today's entry if exists, else append
    var existing = hist[id].findIndex(function(e) { return e.date === today; });
    if (existing >= 0) {
      hist[id][existing].value = value;
    } else {
      hist[id].push({ date: today, value: value });
    }
    // Keep last 30 entries
    if (hist[id].length > 30) hist[id] = hist[id].slice(-30);
    saveWeightHistory(hist);
  }

  // Resolve the main work based on current phase (top-level helpers)
  function resolveMain(s) {
    if (!s) return [];
    if (s.main) return s.main;
    if (s.mainByPhase) {
      var p = state.phases.muscleUp;
      var phaseDef = s.mainByPhase[p];
      if (phaseDef && phaseDef.sameAs) phaseDef = s.mainByPhase[phaseDef.sameAs];
      return phaseDef && phaseDef.items ? phaseDef.items : [];
    }
    if (s.mainByHangboardPhase) {
      var p = state.phases.hangboard;
      var phaseDef = s.mainByHangboardPhase[p];
      return phaseDef && phaseDef.items ? phaseDef.items : [];
    }
    return [];
  }
  function resolveMainLabel(s) {
    if (!s) return '';
    if (s.mainByPhase) {
      var p = state.phases.muscleUp;
      var phaseDef = s.mainByPhase[p];
      if (phaseDef && phaseDef.sameAs) phaseDef = s.mainByPhase[phaseDef.sameAs];
      return phaseDef && phaseDef.label ? phaseDef.label : '';
    }
    if (s.mainByHangboardPhase) {
      var p = state.phases.hangboard;
      var phaseDef = s.mainByHangboardPhase[p];
      return phaseDef && phaseDef.label ? phaseDef.label : '';
    }
    return '';
  }

    const dateStr = today.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

    var resolvedMain = resolveMain(session);

    // Build session items list and count progress
    const sessionItems = session ? [
      ...(session.warmup || []),
      ...(session.structure || []),
      ...resolvedMain,
      ...(session.finisher || []),
      ...(session.cooldown || []),
    ] : [];
    const sessionDone = sessionItems.filter((_, i) => state.data.session[`s${i}`]).length;
    const sessionTotal = sessionItems.length;

    const mobilityItems = DAILY_MOBILITY.flatMap(b => b.items);
    const mobilityDone = mobilityItems.filter((_, i) => state.data.mobility[`m${i}`]).length;
    const mobilityTotal = mobilityItems.length;

    let content = '';

    if (state.view === 'today') {
      content = renderToday(session, accent);
    } else if (state.view === 'mobility') {
      content = renderMobility(accent);

  function renderToday(session, accent) {

    // Sliders counter
    html += `
      <div style="background: #0f0f0f; border: 1px solid #1f1f1f; border-radius: 14px; padding: 16px; margin-bottom: 16px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
          <div>
            <div style="font-size: 13px; font-weight: 700; color: #fff;">Sciatic slider micro-doses</div>

          var items = SUPPLEMENTS.filter(function(s) { return s.group === g.id; });

          return `
            <div style="margin-bottom: 14px;">
              <div style="font-size: 10px; font-weight: 700; color: ${g.color}; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; padding-left: 4px;">${g.label}</div>
              ${items.map(function(s) {
                return `
                  <div class="checkbox-row ${state.data.supplements[s.id] ? 'done' : ''}">
                    <div class="check-circle ${state.data.supplements[s.id] ? 'done' : ''}" data-supp="${s.id}">${Icon.Check}</div>
                    <div style="flex: 1;" data-supp="${s.id}">
                      <div style="display: flex; justify-content: space-between; align-items: baseline; gap: 8px;">
                        <div style="display: flex; align-items: center; gap: 2px; flex: 1; min-width: 0;">
                          <div class="check-text" style="font-size: 14px; font-weight: 600;">${s.name}</div>
                          ${makeInfoBtn(s.name)}

                        <div style="font-size: 12px; color: #888; font-weight: 600; flex-shrink: 0;">${s.dose}</div>

                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          `;
        }).join('')}
      </div>
    `;

    // Session
    if (session) {
      html += `
        <div style="margin-bottom: 24px;">
          <div style="font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: #666; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 6px;">
            ${Icon.Dumbbell} Today's session

          ${session.note ? `

            </div>
          ` : ''}

          ${session.rules ? `
            <div style="padding: 10px 14px; background: #1f0f0f; border: 1px solid #3f1f1f; border-radius: 10px; margin-bottom: 12px;">
              <div style="font-size: 10px; font-weight: 700; color: #fca5a5; letter-spacing: 1px; margin-bottom: 6px; text-transform: uppercase;">Sciatic phase rules</div>
              ${session.rules.map(r => `<div style="font-size: 12px; color: #f87171; margin-top: 2px;">• ${r}</div>`).join('')}

          ` : ''}

          ${renderBlock('Warm-up', session.warmup, 0, 'warmup')}
          ${renderBlock('Structure', session.structure, (session.warmup ? session.warmup.length : 0), 'structure')}
          ${session.muscleUpPhase || session.hangboardPhase ? `
            <div style="margin-bottom: 12px; padding: 12px 14px; background: #0f0f0f; border: 1px solid ${accent}; border-radius: 10px;">
              <div style="font-size: 10px; font-weight: 700; color: ${accent}; letter-spacing: 1.5px; margin-bottom: 6px; text-transform: uppercase;">
                ${session.muscleUpPhase ? 'Muscle-up Phase' : 'Hangboard Phase'}
              </div>
              <div style="display: flex; justify-content: space-between; align-items: center; gap: 10px;">
                <div style="font-size: 13px; color: #fff; font-weight: 600; flex: 1;">${resolveMainLabel(session)}</div>
                <button id="phase-change-btn" style="background: ${accent}; border: none; color: #fff; font-size: 11px; font-weight: 700; padding: 6px 12px; border-radius: 6px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px;">Change</button>
              </div>
              ${renderCriteriaCard(session, accent)}
              ${session.hangboardPhase ? `
                <button id="hangboard-timer-btn" style="width: 100%; margin-top: 10px; padding: 12px; background: ${accent}; border: none; border-radius: 8px; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">${Icon.Timer}<span>Hangboard repeater timer</span></button>
              ` : ''}
            </div>
          ` : ''}
          ${renderBlock('Main work', resolvedMain, (session.warmup ? session.warmup.length : 0) + (session.structure ? session.structure.length : 0), 'main')}
          ${session.options ? renderOptions(session.options) : ''}
          ${renderBlock('Finisher', session.finisher, (session.warmup ? session.warmup.length : 0) + (session.structure ? session.structure.length : 0) + resolvedMain.length, 'finisher')}
          ${renderBlock('Cool-down', session.cooldown, (session.warmup ? session.warmup.length : 0) + (session.structure ? session.structure.length : 0) + resolvedMain.length + (session.finisher ? session.finisher.length : 0), 'cooldown')}

          ${session.autoReg ? `

            </div>
          ` : ''}

          ${session.paused ? `
            <div style="padding: 14px; background: #1a0e0e; border: 1px solid #3a1a1a; border-radius: 10px; margin-top: 12px;">
              <div style="font-size: 11px; font-weight: 700; color: #f87171; letter-spacing: 1px; margin-bottom: 8px; text-transform: uppercase;">Paused for sciatic phase</div>

    // Notes

      </div>
    `;

    return html;
  }

  function renderBlock(title, items, indexOffset, key) {
    var accent = SESSIONS[state.data.dayName] ? SESSIONS[state.data.dayName].color : '#ea580c';
    if (!items || items.length === 0) return '';
    const done = items.filter((_, i) => state.data.session[`s${indexOffset + i}`]).length;
    const expanded = state.expanded[key];
    return `
      <div style="margin-bottom: 12px;">
        <div class="block-header" data-expand="${key}">
          ${expanded ? Icon.ChevronDown : Icon.ChevronRight}
          <div style="flex: 1; font-size: 13px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 1px;">${title}</div>
          <div style="font-size: 12px; color: ${done === items.length && items.length > 0 ? '#22c55e' : '#666'}; font-weight: 600;">${done}/${items.length}</div>
        </div>
        ${expanded ? `<div style="margin-top: 8px;">${items.map((item, i) => {
          const k = `s${indexOffset + i}`;
          const isDone = !!state.data.session[k];
          var weightId = item.id || null;
          var savedWeight = weightId && state.weights[weightId] ? state.weights[weightId] : '';
          return `
            <div class="checkbox-row ${isDone ? 'done' : ''}">
              <div class="check-circle ${isDone ? 'done' : ''}" data-session="${k}">${Icon.Check}</div>
              <div style="flex: 1;" data-session="${k}">
                <div style="display: flex; align-items: center; gap: 2px;">
                  <div class="check-text" style="font-size: 14px; font-weight: 600; flex: 1;">${item.name}</div>
                  ${makeInfoBtn(item.name)}
                </div>
                <div style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 4px;">
                  ${(function() {
                    if (!item.target) return '';
                    var targetSeconds = parseRestToSeconds(item.target);
                    var isDurationOnly = targetSeconds > 0 && !item.target.match(/[×x]/) && !item.target.match(/sets?/i);
                    if (isDurationOnly) {
                      // Pure duration (cardio 3 min) — simple countdown
                      return '<button class="timer-simple-btn" data-rest-seconds="' + targetSeconds + '" data-timer-label="' + item.name.replace(/"/g, '&quot;') + '" style="background: #1a1a1a; border: 1px solid #3a3a3a; padding: 4px 10px; border-radius: 14px; color: #d5d5d5; font-size: 11px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; user-select: none;">' + Icon.Timer + '<span>' + item.target + ' timer</span></button>';
                    }
                    return '<span style="font-size: 12px; color: #888;">' + item.target + '</span>';
                  })()}
                  ${(function() {
                    if (!item.rest) return '';
                    // Hangboard hangs use the dedicated repeater timer (auto-counts work + rest)
                    if (item.isHangboard) {
                      return '<button class="hangboard-timer-btn" style="background: ' + accent + '; border: none; padding: 5px 12px; border-radius: 14px; color: #fff; font-size: 11px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; user-select: none;">' + Icon.Timer + '<span>Open repeater timer</span></button>';
                    }
                    var restS = parseRestToSeconds(item.rest);
                    var sets = parseSetCount(item.target);
                    // Bouldering / attempt-based work (no real "sets") — simple restartable rest timer
                    if (sets < 1 || /problem|attempt/i.test(item.target || '')) {
                      return '<button class="timer-simple-btn" data-rest-seconds="' + restS + '" data-timer-label="Rest — ' + item.name.replace(/"/g, '&quot;') + '" style="background: #1a1a1a; border: 1px solid #3a3a3a; padding: 4px 10px; border-radius: 14px; color: #d5d5d5; font-size: 11px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; user-select: none;">' + Icon.Timer + '<span>rest timer ' + item.rest + '</span></button>';
                    }
                    // Structured SET timer for true multi-set exercises
                    var workS = parseSetWorkSeconds(item.target);
                    return '<button class="set-timer-btn" data-sets="' + sets + '" data-rest-seconds="' + restS + '" data-work-seconds="' + workS + '" data-timer-label="' + item.name.replace(/"/g, '&quot;') + '" style="background: ' + accent + '; border: none; padding: 5px 12px; border-radius: 14px; color: #fff; font-size: 11px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; user-select: none;">' + Icon.Timer + '<span>Set timer (' + sets + '×, rest ' + item.rest + ')</span></button>';
                  })()}
                  ${item.rpe ? `<span style="font-size: 11px; color: #666;">RPE ${item.rpe}</span>` : ''}
                </div>
                ${item.weight ? `
                  <div style="margin-top: 8px; padding: 8px 10px; background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 8px;" data-noprop="1">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                      <div style="font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px;">Weight • ${item.weight}</div>
                      ${state.weightHistory[weightId] && state.weightHistory[weightId].length > 0 ? `<button class="weight-history-btn" data-history-id="${weightId}" data-history-name="${item.name.replace(/"/g, '&quot;')}" style="background: transparent; border: none; padding: 2px 4px; cursor: pointer; color: #888; font-size: 11px; display: inline-flex; align-items: center; gap: 4px;">${Icon.ChartIcon}<span>${state.weightHistory[weightId].length}</span></button>` : ''}
                    </div>
                    <input type="text" inputmode="decimal" placeholder="kg" value="${savedWeight}" data-weight="${weightId}" style="width: 100%; padding: 6px 8px; background: #161616; border: 1px solid #333; border-radius: 6px; color: #fff; font-size: 13px;" />
                  </div>
                ` : ''}
              </div>
            </div>
          `;
        }).join('')}</div>` : ''}
      </div>
    `;
  }

  function renderOptions(options) {
    return `
      <div style="background: #0f0f0f; border: 1px solid #1f1f1f; border-radius: 12px; padding: 14px; margin-bottom: 12px;">
        <div style="font-size: 11px; font-weight: 700; color: #888; letter-spacing: 1px; margin-bottom: 10px; text-transform: uppercase;">Options — pick one</div>

          </div>
        `).join('')}
      </div>
    `;
  }

  function renderMobility(accent) {
    let html = `
      <div style="margin-bottom: 16px;">
        <h2 style="margin: 0; font-size: 18px; font-weight: 800;">Daily mobility routine</h2>

    let idx = 0;
    DAILY_MOBILITY.forEach((block, bi) => {
      html += `<div style="margin-bottom: 18px;">
        <div style="font-size: 12px; font-weight: 700; color: ${accent}; letter-spacing: 1px; margin-bottom: 8px; text-transform: uppercase;">

      block.items.forEach((item, i) => {

        const done = !!state.data.mobility[key];
        html += `
          <div class="checkbox-row ${done ? 'done' : ''}">
            <div class="check-circle ${done ? 'done' : ''}" data-mobility="${key}">${Icon.Check}</div>
            <div style="flex: 1;" data-mobility="${key}">
              <div style="display: flex; align-items: center; gap: 2px;">
                <div class="check-text" style="font-size: 14px; font-weight: 600; flex: 1;">${item.name}</div>
                ${makeInfoBtn(item.name)}
              </div>
              ${(function() {
              if (!item.target) return '';
              var ts = parseRestToSeconds(item.target);
              var isDurationOnly = ts > 0 && !item.target.match(/[×x]/);
              if (isDurationOnly) {
                return '<div style="margin-top: 6px;"><button class="timer-simple-btn" data-rest-seconds="' + ts + '" data-timer-label="' + item.name.replace(/"/g, '&quot;') + '" style="background: #1a1a1a; border: 1px solid #3a3a3a; padding: 4px 10px; border-radius: 14px; color: #d5d5d5; font-size: 11px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; user-select: none;" data-noprop="1">' + Icon.Timer + '<span>' + item.target + ' timer</span></button></div>';
              }
              return '<div style="font-size: 12px; color: #888; margin-top: 2px;">' + item.target + '</div>';
            })()}
              ${item.cue ? `<div style="font-size: 11px; color: ${accent}; margin-top: 6px; font-style: italic; line-height: 1.4;">💡 ${item.cue}</div>` : ''}
            </div>
          </div>
        `;
        idx++;
      });
      html += `</div>`;
    });

    return html;
  }

  function renderWeekly(accent) {
    let html = `
      <div style="margin-bottom: 16px;">
        <h2 style="margin: 0; font-size: 18px; font-weight: 800;">Weekly check-in</h2>
        <div style="font-size: 13px; color: #888; margin-top: 4px;">Sunday evening, 2 minutes.</div>

      <button id="weekly-toggle" style="width: 100%; padding: 14px; background: ${accent}; border: none; border-radius: 12px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 16px;">
        ${state.showWeeklyForm ? 'Cancel' : '+ New weekly check-in'}
      </button>
    `;

    if (state.showWeeklyForm) {
      html += `
        <div style="background: #0f0f0f; border: 1px solid #1f1f1f; border-radius: 12px; padding: 16px; margin-bottom: 16px;">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;">

        html += `
          <div style="background: #0f0f0f; border: 1px solid #1f1f1f; border-radius: 12px; padding: 14px; margin-bottom: 10px;">

              <div><span style="color: #666;">Sciatic:</span> <span style="color: ${sciaticColor}; font-weight: 600;">${entry.sciatic || '—'}</span></div>

          </div>

      });

    return html;

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ============ EVENT HANDLERS ============

  function attachHandlers() {
    // Tab switching
    document.querySelectorAll('.tab-button').forEach(btn => {
      btn.addEventListener('click', () => {
        state.view = btn.getAttribute('data-view');
        render();
      });
    });

    // Reset
    const resetBtn = document.getElementById('reset-btn');
    if (resetBtn) {
      resetBtn.addEventListener('click', () => {
        if (confirm('Reset today? All checkmarks for today will be cleared.')) {
          state.data = emptyDay();
          persist();
          render();
        }
      });
    }

    // Sliders
    const sliderMinus = document.getElementById('slider-minus');
    if (sliderMinus) sliderMinus.addEventListener('click', () => {
      state.data.sliders = Math.max(0, state.data.sliders - 1);
      persist(); render();
    });
    const sliderPlus = document.getElementById('slider-plus');
    if (sliderPlus) sliderPlus.addEventListener('click', () => {
      state.data.sliders = Math.min(9, state.data.sliders + 1);
      persist(); render();
    });

    // Sciatic angle button
    var angleBtn = document.getElementById('sciatic-angle-btn');
    if (angleBtn) {
      angleBtn.addEventListener('click', function() {
        showAngleHistoryModal();
      });
    }

    // Wellness check-in tap targets
    document.querySelectorAll('.wellness-display').forEach(function(el) {
      el.addEventListener('click', function() {
        var metric = el.getAttribute('data-wellness');
        showWellnessInput(metric);
      });
    });

    // Criteria card button
    var critBtn = document.getElementById('criteria-open-btn');
    if (critBtn) {
      critBtn.addEventListener('click', function() {
        showCriteriaModal();
      });
    }

    // Hangboard timer button
    var hbBtn = document.getElementById('hangboard-timer-btn');
    if (hbBtn) {
      hbBtn.addEventListener('click', function() {
        showHangboardTimer();
      });
    }

    // Supplements
    document.querySelectorAll('[data-supp]').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.getAttribute('data-supp');
        state.data.supplements[id] = !state.data.supplements[id];
        persist(); render();
      });
    });

    // Session checkboxes (now on check-circle and main area, but not weight input)
    document.querySelectorAll('[data-session]').forEach(el => {
      el.addEventListener('click', (e) => {
        // Don't trigger if clicking inside a weight input area
        var target = e.target;
        while (target && target !== el) {
          if (target.getAttribute && target.getAttribute('data-noprop') === '1') return;
          if (target.tagName === 'INPUT') return;
          target = target.parentElement;
        }
        const k = el.getAttribute('data-session');
        state.data.session[k] = !state.data.session[k];
        persist(); render();
      });
    });

    // Weight inputs - save without re-rendering (so input doesn't lose focus)
    document.querySelectorAll('[data-weight]').forEach(el => {
      var saveTimer = null;
      el.addEventListener('input', (e) => {
        var id = el.getAttribute('data-weight');
        state.weights[id] = el.value;
        saveWeights(state.weights);
        // Debounce history recording so we only save when user stops typing
        if (saveTimer) clearTimeout(saveTimer);
        saveTimer = setTimeout(function() {
          recordWeightHistory(id, el.value);
        }, 1500);
      });
      // Prevent click from bubbling to parent checkbox handler
      el.addEventListener('click', (e) => e.stopPropagation());
    });
    // Weight history buttons
    document.querySelectorAll('.weight-history-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var id = btn.getAttribute('data-history-id');
        var name = btn.getAttribute('data-history-name');
        showWeightHistoryModal(id, name);
      });
    });

    // Mobility checkboxes
    document.querySelectorAll('[data-mobility]').forEach(el => {
      el.addEventListener('click', () => {
        const k = el.getAttribute('data-mobility');
        state.data.mobility[k] = !state.data.mobility[k];
        persist(); render();
      });
    });

    // Block expansion
    document.querySelectorAll('[data-expand]').forEach(el => {
      el.addEventListener('click', () => {
        const k = el.getAttribute('data-expand');
        state.expanded[k] = !state.expanded[k];
        render();
      });
    });

    // Notes
    const notes = document.getElementById('notes-textarea');
    if (notes) {
      notes.addEventListener('input', (e) => {
        state.data.notes = e.target.value;
        persist();
      });
    }

    // Simple countdown buttons (pure durations like cardio)
    document.querySelectorAll('.timer-simple-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var seconds = parseInt(btn.getAttribute('data-rest-seconds'));
        var label = btn.getAttribute('data-timer-label');
        if (seconds > 0) startTimer(seconds, label);
      });
    });

    // Structured SET timer buttons (work/rest/repeat for multi-set exercises)
    document.querySelectorAll('.set-timer-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var sets = parseInt(btn.getAttribute('data-sets'));
        var restS = parseInt(btn.getAttribute('data-rest-seconds'));
        var workS = parseInt(btn.getAttribute('data-work-seconds'));
        var label = btn.getAttribute('data-timer-label');
        if (sets > 0 && restS > 0) startSetTimer(sets, restS, workS, label);
      });
    });

    // Per-exercise hangboard repeater timer buttons
    document.querySelectorAll('.hangboard-timer-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        showHangboardTimer();
      });
    });

    // Info buttons
    document.querySelectorAll('.info-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();  // Prevent triggering checkbox toggle
        var name = btn.getAttribute('data-info-name');
        showInfoModal(name);
      });

    // Phase change button
    var phaseBtn = document.getElementById('phase-change-btn');
    if (phaseBtn) {

      });

    // Weekly form
    const weeklyToggle = document.getElementById('weekly-toggle');
    if (weeklyToggle) {
      weeklyToggle.addEventListener('click', () => {
        state.showWeeklyForm = !state.showWeeklyForm;
        render();
      });
    }
    const weeklySave = document.getElementById('weekly-save');
    if (weeklySave) {
      weeklySave.addEventListener('click', () => {
        const entry = {
          date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
          bodyweight: document.getElementById('w-bw').value,
          slump: document.getElementById('w-slump').value,
          sleep: document.getElementById('w-sleep').value,
          sciatic: document.getElementById('w-sciatic').value,
          notes: document.getElementById('w-notes').value,
        };
        state.weekly.entries.unshift(entry);
        saveWeekly(state.weekly);
        state.showWeeklyForm = false;
        render();
      });
    }
  }





  // ============ CRITERIA CARD ============

  function renderCriteriaCard(session, accent) {
    var phaseType = session.muscleUpPhase ? 'muscleUp' : 'hangboard';
    var currentPhase = session.muscleUpPhase ? state.phases.muscleUp : state.phases.hangboard;
    var critDef = PHASE_CRITERIA[phaseType] && PHASE_CRITERIA[phaseType][currentPhase];
    if (!critDef) return '';

    var metCount = 0;
    critDef.criteria.forEach(function(c) {
      var best = state.criteria[c.id];
      if (best !== undefined && best !== null && parseFloat(best) >= c.target) metCount++;
    });
    var allMet = metCount === critDef.criteria.length;

    return '<div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid #1f1f1f;">' +
      '<div style="display: flex; justify-content: space-between; align-items: center;">' +
        '<div style="font-size: 10px; font-weight: 700; color: ' + (allMet ? '#22c55e' : '#888') + '; letter-spacing: 1px; text-transform: uppercase;">Progress to ' + critDef.nextPhase + '</div>' +
        '<div style="font-size: 11px; font-weight: 700; color: ' + (allMet ? '#22c55e' : '#888') + ';">' + metCount + '/' + critDef.criteria.length + ' met</div>' +
      '</div>' +
      '<button id="criteria-open-btn" style="width: 100%; margin-top: 8px; padding: 8px; background: #161616; border: 1px solid #2a2a2a; border-radius: 8px; color: #d5d5d5; font-size: 12px; font-weight: 600; cursor: pointer;">' +
        (allMet ? 'All criteria met — ready to advance' : 'View advancement criteria') +
      '</button>' +
    '</div>';
  }

  // ============ HANGBOARD REPEATER TIMER ============

  var hangboardState = null;

  function showHangboardTimer() {
    var phase = state.phases.hangboard;
    var protocol = HANGBOARD_PROTOCOLS[phase];
    if (!protocol) return;

    var session = SESSIONS[state.data.dayName];
    var accent = session ? session.color : '#dc2626';

    // Build the full sequence of phases (work/rest segments)
    var sequence = buildHangboardSequence(protocol);

    hangboardState = {
      protocol: protocol,
      sequence: sequence,
      index: -1,       // -1 = not started
      secondsLeft: 0,
      running: false,
      intervalId: null,
      accent: accent,
    };

    renderHangboardModal();
  }

  function buildHangboardSequence(protocol) {
    var seq = [];
    for (var s = 0; s < protocol.sets; s++) {
      if (protocol.isLadder) {
        // Bechtel ladder: each rung is work then rest
        for (var r = 0; r < protocol.ladder.length; r++) {
          seq.push({ type: 'work', seconds: protocol.ladder[r].work, set: s + 1, rep: r + 1, totalReps: protocol.ladder.length });
          if (protocol.ladder[r].rest > 0) {
            seq.push({ type: 'rest', seconds: protocol.ladder[r].rest, set: s + 1, rep: r + 1, totalReps: protocol.ladder.length });
          }
        }
      } else {
        for (var r = 0; r < protocol.repsPerSet; r++) {
          seq.push({ type: 'work', seconds: protocol.workSec, set: s + 1, rep: r + 1, totalReps: protocol.repsPerSet });
          if (protocol.restSec > 0 && r < protocol.repsPerSet - 1) {
            seq.push({ type: 'rest', seconds: protocol.restSec, set: s + 1, rep: r + 1, totalReps: protocol.repsPerSet });
          }
        }
      }
      // Set rest (not after last set)
      if (s < protocol.sets - 1) {
        seq.push({ type: 'setrest', seconds: protocol.setRestSec, set: s + 1, rep: 0, totalReps: 0 });
      }
    }
    return seq;
  }

  function hangboardBeep(freq, duration) {
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq || 880;
      gain.gain.value = 0.3;
      osc.start();
      setTimeout(function() { osc.stop(); ctx.close(); }, duration || 200);
    } catch (e) {}
  }

  function hangboardVibrate(pattern) {
    if (window.navigator && window.navigator.vibrate) {
      try { window.navigator.vibrate(pattern); } catch (e) {}
    }
  }

  function startHangboardSequence() {
    if (!hangboardState) return;
    hangboardState.index = 0;
    hangboardState.secondsLeft = hangboardState.sequence[0].seconds;
    hangboardState.running = true;
    hangboardBeep(880, 200);
    hangboardVibrate(200);
    tickHangboard();
    hangboardState.intervalId = setInterval(tickHangboard, 1000);
    renderHangboardModal();
  }

  function tickHangboard() {
    if (!hangboardState || !hangboardState.running) return;
    hangboardState.secondsLeft--;

    // Countdown beeps in last 3 seconds
    if (hangboardState.secondsLeft <= 3 && hangboardState.secondsLeft > 0) {
      hangboardBeep(660, 100);
    }

    if (hangboardState.secondsLeft <= 0) {
      // Move to next segment
      hangboardState.index++;
      if (hangboardState.index >= hangboardState.sequence.length) {
        // Finished
        clearInterval(hangboardState.intervalId);
        hangboardState.running = false;
        hangboardState.index = hangboardState.sequence.length;
        hangboardBeep(1100, 600);
        hangboardVibrate([300, 100, 300, 100, 300]);
        renderHangboardModal();
        return;
      }
      var nextSeg = hangboardState.sequence[hangboardState.index];
      hangboardState.secondsLeft = nextSeg.seconds;
      // Transition beep: high for work, low for rest
      if (nextSeg.type === 'work') {
        hangboardBeep(880, 250);
        hangboardVibrate([100, 50, 100]);
      } else {
        hangboardBeep(440, 200);
        hangboardVibrate(150);
      }
    }
    renderHangboardModal();
  }

  function stopHangboard() {
    if (hangboardState && hangboardState.intervalId) {
      clearInterval(hangboardState.intervalId);
    }
    hangboardState = null;
    var modal = document.getElementById('hangboard-modal');
    if (modal) document.body.removeChild(modal);
  }

  function pauseResumeHangboard() {
    if (!hangboardState) return;
    if (hangboardState.running) {
      clearInterval(hangboardState.intervalId);
      hangboardState.running = false;
    } else {
      hangboardState.running = true;
      hangboardState.intervalId = setInterval(tickHangboard, 1000);
    }
    renderHangboardModal();
  }

        '<button id="hb-cancel-btn" style="width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer;">Cancel</button>';
    } else if (hs.index >= hs.sequence.length) {

        '<div style="font-size: 14px; color: #aaa; margin-bottom: 24px;">' + hs.protocol.label + ' done. Rest fully before the next grip.</div>' +
        '<button id="hb-restart-btn" style="width: 100%; padding: 14px; background: ' + accent + '; border: none; border-radius: 10px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 8px;">Run again (other grip)</button>' +

      }

      // Count remaining work segments
      var totalWork = hs.sequence.filter(function(s) { return s.type === 'work'; }).length;
      var doneWork = hs.sequence.slice(0, hs.index).filter(function(s) { return s.type === 'work'; }).length;

      inner =

    var startBtn = document.getElementById('hb-start-btn');
    if (startBtn) startBtn.addEventListener('click', startHangboardSequence);
    var pauseBtn = document.getElementById('hb-pause-btn');
    if (pauseBtn) pauseBtn.addEventListener('click', pauseResumeHangboard);
    var cancelBtn = document.getElementById('hb-cancel-btn');
    if (cancelBtn) cancelBtn.addEventListener('click', stopHangboard);
    var restartBtn = document.getElementById('hb-restart-btn');
    if (restartBtn) restartBtn.addEventListener('click', function() {
      var phase = state.phases.hangboard;
      var protocol = HANGBOARD_PROTOCOLS[phase];
      hangboardState = {
        protocol: protocol,
        sequence: buildHangboardSequence(protocol),
        index: -1, secondsLeft: 0, running: false, intervalId: null, accent: accent,
      };
      renderHangboardModal();
    });
  }

  // ============ DASHBOARD ============

  function renderDashboard(accent) {
    var html = '<div style="margin-bottom: 16px;">' +
      '<h2 style="margin: 0; font-size: 18px; font-weight: 800;">Dashboard</h2>' +
      '<div style="font-size: 13px; color: #888; margin-top: 4px;">Patterns from your daily check-ins.</div>' +
    '</div>';

    // Gather wellness data, sorted by date
    var dates = Object.keys(state.wellness).sort();
    var entries = dates.map(function(d) {
      var w = state.wellness[d];
      return { date: d, sleep: w.sleep, soreness: w.soreness, motivation: w.motivation };
    });

    if (entries.length === 0) {
      html += '<div style="padding: 24px; text-align: center; color: #555; font-size: 13px; background: #0f0f0f; border-radius: 12px; border: 1px solid #1f1f1f;">No check-ins logged yet. Use the morning check-in card on the Today tab.</div>';
      return html;
    }

    // Recent 14 entries
    var recent = entries.slice(-14);

    // Mini bar chart helper
    function miniChart(label, key, color, maxScale) {
      var vals = recent.filter(function(e) { return e[key] !== null && e[key] !== undefined; });
      if (vals.length === 0) return '';
      var bars = recent.map(function(e) {
        var v = e[key];
        if (v === null || v === undefined) {
          return '<div style="flex: 1; min-width: 12px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end;"><div style="width: 100%; max-width: 20px; height: 4px; background: #1a1a1a; border-radius: 2px;"></div></div>';
        }
        var h = 12 + (v / maxScale) * 90;
        return '<div style="flex: 1; min-width: 12px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 3px;">' +
          '<div style="font-size: 9px; color: #888; font-weight: 700;">' + v + '</div>' +
          '<div style="width: 100%; max-width: 20px; height: ' + h + 'px; background: ' + color + '; border-radius: 3px 3px 0 0;"></div>' +
        '</div>';
      }).join('');
      // Average
      var sum = 0; vals.forEach(function(e) { sum += e[key]; });
      var avg = (sum / vals.length).toFixed(1);
      return '<div style="background: #0f0f0f; border: 1px solid #1f1f1f; border-radius: 12px; padding: 14px; margin-bottom: 12px;">' +
        '<div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px;">' +
          '<div style="font-size: 12px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 1px;">' + label + '</div>' +
          '<div style="font-size: 11px; color: #888;">avg ' + avg + '</div>' +
        '</div>' +
        '<div style="display: flex; align-items: flex-end; gap: 3px; min-height: 110px;">' + bars + '</div>' +
      '</div>';
    }

    html += miniChart('Sleep (hours)', 'sleep', '#fbbf24', 9);
    html += miniChart('Soreness (1-10)', 'soreness', '#f87171', 10);
    html += miniChart('Motivation (1-10)', 'motivation', '#22c55e', 10);

    // Correlation insight: sleep vs motivation
    var paired = entries.filter(function(e) { return e.sleep !== null && e.motivation !== null; });
    if (paired.length >= 5) {
      // Split by sleep median
      var sleeps = paired.map(function(e) { return e.sleep; }).sort(function(a,b){return a-b;});
      var medianSleep = sleeps[Math.floor(sleeps.length / 2)];
      var lowSleep = paired.filter(function(e) { return e.sleep < medianSleep; });
      var highSleep = paired.filter(function(e) { return e.sleep >= medianSleep; });
      if (lowSleep.length >= 2 && highSleep.length >= 2) {
        var lowMot = lowSleep.reduce(function(s,e){return s+e.motivation;}, 0) / lowSleep.length;
        var highMot = highSleep.reduce(function(s,e){return s+e.motivation;}, 0) / highSleep.length;
        var diff = (highMot - lowMot).toFixed(1);
        html += '<div style="background: #0f1a0f; border: 1px solid #1f3f1f; border-radius: 12px; padding: 14px; margin-bottom: 12px;">' +
          '<div style="font-size: 11px; font-weight: 700; color: #22c55e; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px;">Pattern detected</div>' +
          '<div style="font-size: 13px; color: #d5d5d5; line-height: 1.5;">On nights you slept ' + medianSleep + 'h+, your motivation averaged <strong style="color:#fff;">' + highMot.toFixed(1) + '</strong> vs <strong style="color:#fff;">' + lowMot.toFixed(1) + '</strong> on shorter nights' + (diff > 0 ? ' — a ' + diff + '-point lift.' : '.') + '</div>' +
        '</div>';
      }
    }

    html += '<div style="font-size: 11px; color: #555; text-align: center; margin-top: 8px;">Showing last ' + recent.length + ' check-ins. Patterns get sharper with more data.</div>';

    return html;
  }

  // ============ TIMER ============
  // Two timer types:
  //  - Simple countdown: a single duration (e.g. cardio 3 min)
  //  - Set timer: structured work/rest cycle for multi-set exercises (the main one)

  function timerBeep(freq, duration) {
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq || 880;
      gain.gain.value = 0.3;
      osc.start();
      setTimeout(function() { osc.stop(); ctx.close(); }, duration || 250);
    } catch (e) {}
  }
  function timerVibrate(pattern) {
    if (window.navigator && window.navigator.vibrate) {
      try { window.navigator.vibrate(pattern); } catch (e) {}
    }
  }

  // ---- SIMPLE COUNTDOWN (single duration) ----
  function startTimer(seconds, label) {
    if (state.timer.intervalId) clearInterval(state.timer.intervalId);
    state.timer.mode = 'simple';
    state.timer.seconds = seconds;
    state.timer.total = seconds;
    state.timer.running = true;
    state.timer.label = label || '';
    state.timer.intervalId = setInterval(function() {
      state.timer.seconds--;
      if (state.timer.seconds <= 3 && state.timer.seconds > 0) timerBeep(660, 100);
      if (state.timer.seconds <= 0) {
        clearInterval(state.timer.intervalId);
        state.timer.running = false;
        state.timer.seconds = 0;
        timerVibrate([200, 100, 200, 100, 200]);
        timerBeep(900, 400);
      }
      renderTimer();
    }, 1000);
    renderTimer();
  }

  // ---- STRUCTURED SET TIMER ----
  // setTimer state: { totalSets, currentSet, phase: 'work'|'rest'|'ready'|'done',
  //                   restSec, workSec, secondsLeft, running, intervalId, label }
  function startSetTimer(totalSets, restSec, workSec, label) {
    if (state.timer.intervalId) clearInterval(state.timer.intervalId);
    if (state.setTimer && state.setTimer.intervalId) clearInterval(state.setTimer.intervalId);
    state.timer.running = false;
    state.timer.seconds = 0;
    state.setTimer = {
      totalSets: totalSets,
      currentSet: 1,
      phase: workSec > 0 ? 'work' : 'ready',  // if work is timed, start the work countdown; else wait for "Set done"
      restSec: restSec,
      workSec: workSec,
      secondsLeft: workSec > 0 ? workSec : 0,
      running: workSec > 0,
      intervalId: null,
      label: label || '',
    };
    if (workSec > 0) {
      timerBeep(880, 250);
      timerVibrate([100, 50, 100]);
      state.setTimer.intervalId = setInterval(tickSetTimer, 1000);
    }
    renderTimer();
  }

  function tickSetTimer() {
    var st = state.setTimer;
    if (!st || !st.running) return;
    st.secondsLeft--;
    if (st.secondsLeft <= 3 && st.secondsLeft > 0) timerBeep(660, 100);
    if (st.secondsLeft <= 0) {
      if (st.phase === 'work') {
        // Work done -> go to rest (unless last set)
        if (st.currentSet >= st.totalSets) {
          finishSetTimer();
          return;
        }
        st.phase = 'rest';
        st.secondsLeft = st.restSec;
        timerBeep(440, 250);
        timerVibrate(200);
      } else if (st.phase === 'rest') {
        // Rest done -> next set
        st.currentSet++;
        if (st.workSec > 0) {
          st.phase = 'work';
          st.secondsLeft = st.workSec;
          timerBeep(880, 250);
          timerVibrate([100, 50, 100]);
        } else {
          // Rep-based work: wait for user to tap "Set done"
          st.phase = 'ready';
          st.running = false;
          clearInterval(st.intervalId);
          timerBeep(880, 300);
          timerVibrate([150, 80, 150]);
        }
      }
    }
    renderTimer();
  }

  // Called when user taps "Set done" for rep-based exercises
  function setTimerSetDone() {
    var st = state.setTimer;
    if (!st) return;
    if (st.currentSet >= st.totalSets) {
      finishSetTimer();
      return;
    }
    // Start the rest countdown
    st.phase = 'rest';
    st.secondsLeft = st.restSec;
    st.running = true;
    timerBeep(440, 250);
    timerVibrate(200);
    if (st.intervalId) clearInterval(st.intervalId);
    st.intervalId = setInterval(tickSetTimer, 1000);
    renderTimer();
  }

  function finishSetTimer() {
    var st = state.setTimer;
    if (st && st.intervalId) clearInterval(st.intervalId);
    if (st) { st.phase = 'done'; st.running = false; }
    timerBeep(1100, 600);
    timerVibrate([300, 100, 300, 100, 300]);
    renderTimer();
  }

  function setTimerPauseResume() {
    var st = state.setTimer;
    if (!st) return;
    if (st.running) {
      if (st.intervalId) clearInterval(st.intervalId);
      st.running = false;
    } else if (st.phase === 'work' || st.phase === 'rest') {
      st.running = true;
      st.intervalId = setInterval(tickSetTimer, 1000);
    }
    renderTimer();
  }

  function stopSetTimer() {
    var st = state.setTimer;
    if (st && st.intervalId) clearInterval(st.intervalId);
    state.setTimer = null;
    renderTimer();
  }

  function stopTimer() {
    if (state.timer.intervalId) {
      clearInterval(state.timer.intervalId);
      state.timer.intervalId = null;
    }
    state.timer.running = false;
    state.timer.seconds = 0;
    state.timer.total = 0;
    state.timer.label = '';
    renderTimer();
  }

  function pauseResumeTimer() {
    if (state.timer.running) {
      if (state.timer.intervalId) clearInterval(state.timer.intervalId);
      state.timer.intervalId = null;
      state.timer.running = false;
      renderTimer();
    } else if (state.timer.seconds > 0) {
      startTimer(state.timer.seconds, state.timer.label);
    }
  }

  // ---- UNIFIED TIMER BAR RENDER ----
  function renderTimer() {
    var existing = document.getElementById('timer-bar');
    if (existing) existing.remove();

    var accent = SESSIONS[state.data.dayName] ? SESSIONS[state.data.dayName].color : '#ea580c';

    // Set timer takes priority if active
    if (state.setTimer) {
      renderSetTimerBar(accent);
      return;
    }

    // Simple countdown
    if (state.timer.seconds <= 0 && !state.timer.running) return;

    var bar = document.createElement('div');
    bar.id = 'timer-bar';
    var pct = state.timer.total > 0 ? (state.timer.seconds / state.timer.total) * 100 : 0;
    var bgColor = state.timer.seconds <= 5 && state.timer.running ? '#dc2626' : '#0a0a0a';

    bar.style.cssText = 'position: fixed; bottom: 0; left: 0; right: 0; background: ' + bgColor + '; border-top: 2px solid ' + accent + '; padding: 12px 16px; z-index: 101; box-shadow: 0 -8px 24px rgba(0,0,0,0.6); padding-bottom: calc(12px + env(safe-area-inset-bottom));';
    bar.innerHTML =
      '<div style="height: 3px; background: #1a1a1a; border-radius: 2px; margin-bottom: 8px; overflow: hidden;"><div style="height: 100%; background: ' + accent + '; width: ' + pct + '%; transition: width 1s linear;"></div></div>' +
      '<div style="display: flex; align-items: center; gap: 12px;">' +
        '<div style="flex: 1; min-width: 0;">' +
          '<div style="font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px;">' + (state.timer.label ? state.timer.label.substring(0, 32) : 'Timer') + '</div>' +
          '<div style="font-size: 28px; font-weight: 800; color: #fff; line-height: 1; font-variant-numeric: tabular-nums;">' + formatSeconds(state.timer.seconds) + '</div>' +
        '</div>' +
        '<button id="timer-pause-btn" style="width: 44px; height: 44px; border-radius: 50%; background: ' + accent + '; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;">' +
          (state.timer.running ? Icon.Pause : Icon.PlayIcon) +
        '</button>' +
        '<button id="timer-stop-btn" style="background: transparent; border: 1px solid #444; color: #aaa; padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer;">Stop</button>' +
      '</div>';
    document.body.appendChild(bar);
    document.getElementById('timer-pause-btn').addEventListener('click', pauseResumeTimer);
    document.getElementById('timer-stop-btn').addEventListener('click', stopTimer);
  }

  function renderSetTimerBar(accent) {
    var st = state.setTimer;
    var bar = document.createElement('div');
    bar.id = 'timer-bar';

    var phaseColor, phaseLabel, bigContent, controls;

    if (st.phase === 'done') {
      phaseColor = '#22c55e';
      bar.style.cssText = 'position: fixed; bottom: 0; left: 0; right: 0; background: #0a0a0a; border-top: 2px solid #22c55e; padding: 14px 16px; z-index: 101; box-shadow: 0 -8px 24px rgba(0,0,0,0.6); padding-bottom: calc(14px + env(safe-area-inset-bottom));';
      bar.innerHTML =
        '<div style="display: flex; align-items: center; gap: 12px;">' +
          '<div style="flex: 1;">' +
            '<div style="font-size: 11px; color: #22c55e; text-transform: uppercase; letter-spacing: 1px; font-weight: 700;">All ' + st.totalSets + ' sets complete</div>' +
            '<div style="font-size: 15px; color: #fff; font-weight: 700; margin-top: 2px;">' + st.label.substring(0, 34) + '</div>' +
          '</div>' +
          '<button id="settimer-close-btn" style="background: #22c55e; border: none; color: #0a0a0a; padding: 12px 18px; border-radius: 8px; font-size: 13px; font-weight: 800; cursor: pointer;">Done</button>' +
        '</div>';
      document.body.appendChild(bar);
      document.getElementById('settimer-close-btn').addEventListener('click', stopSetTimer);
      return;
    }

    if (st.phase === 'ready') {
      // Waiting for user to do the set and tap "Set done"
      phaseColor = accent;
      bar.style.cssText = 'position: fixed; bottom: 0; left: 0; right: 0; background: #0a0a0a; border-top: 2px solid ' + accent + '; padding: 12px 16px; z-index: 101; box-shadow: 0 -8px 24px rgba(0,0,0,0.6); padding-bottom: calc(12px + env(safe-area-inset-bottom));';
      bar.innerHTML =
        '<div style="font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;">' + st.label.substring(0, 40) + '</div>' +
        '<div style="display: flex; align-items: center; gap: 12px;">' +
          '<div style="flex: 1;">' +
            '<div style="font-size: 13px; color: ' + accent + '; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;">Set ' + st.currentSet + ' of ' + st.totalSets + '</div>' +
            '<div style="font-size: 20px; font-weight: 800; color: #fff; line-height: 1.1;">Do your set, then tap →</div>' +

  function showAngleMeasureModal() {
    var modal = document.createElement('div');

    modal.style.cssText = 'position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.92); z-index: 200; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 20px;';

    var accent = SESSIONS[state.data.dayName] ? SESSIONS[state.data.dayName].color : '#ea580c';
    var hasAPI = typeof window.DeviceOrientationEvent !== 'undefined';
    var needsPermission = hasAPI && typeof DeviceOrientationEvent.requestPermission === 'function';

    modal.innerHTML =
      '<div style="width: 100%; max-width: 380px; text-align: center;">' +
        '<div style="font-size: 11px; font-weight: 700; color: #666; letter-spacing: 1.5px; margin-bottom: 4px; text-transform: uppercase;">Slump test • Knee angle</div>' +
        '<h2 style="margin: 0 0 24px; font-size: 20px; font-weight: 800;">Measure with phone gyroscope</h2>' +

        (hasAPI ?
          '<div id="angle-display" style="font-size: 96px; font-weight: 900; color: ' + accent + '; line-height: 1; font-variant-numeric: tabular-nums; margin: 32px 0;">--°</div>' +
          '<div id="angle-instructions" style="font-size: 14px; color: #aaa; line-height: 1.6; margin-bottom: 20px; padding: 14px 16px; background: #0f0f0f; border: 1px solid #1f1f1f; border-radius: 12px; text-align: left;">' +
            '<strong style="color: #fff;">How to measure:</strong><br>' +
            '1. Sit in slump position (chair edge, leg straight)<br>' +
            '2. Place phone <strong>flat on your shin</strong>, screen up<br>' +
            '3. Tap Start, then slowly extend the knee<br>' +
            '4. Stop when symptoms appear<br>' +
            '5. Max angle is recorded' +
          '</div>' +
          (needsPermission ?
            '<button id="angle-permission-btn" style="width: 100%; padding: 14px; background: ' + accent + '; border: none; border-radius: 10px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 8px; display: inline-flex; align-items: center; justify-content: center; gap: 8px;">' + Icon.Phone + 'Grant motion access</button>' :
            '<button id="angle-start-btn" style="width: 100%; padding: 14px; background: ' + accent + '; border: none; border-radius: 10px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 8px;">Start measuring</button>'
          ) +
          '<button id="angle-save-btn" style="width: 100%; padding: 14px; background: #22c55e; border: none; border-radius: 10px; color: #0a0a0a; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 8px; display: none;">Save measurement</button>'
        :
          '<div style="font-size: 14px; color: #f87171; margin: 20px 0; padding: 14px; background: #1a0e0e; border: 1px solid #3a1a1a; border-radius: 10px;">' +
            'Your browser does not support motion sensors. You can still enter the angle manually below.' +
          '</div>' +
          '<input type="number" id="angle-manual" placeholder="Angle in degrees" style="width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; color: #fff; font-size: 18px; text-align: center; margin-bottom: 8px;" />' +
          '<button id="angle-manual-save-btn" style="width: 100%; padding: 14px; background: #22c55e; border: none; border-radius: 10px; color: #0a0a0a; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 8px;">Save</button>'
        ) +
        '<button id="angle-close-btn" style="width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer;">Cancel</button>' +
      '</div>';

    document.body.appendChild(modal);

    function startListening() {
      var display = document.getElementById('angle-display');
      var saveBtn = document.getElementById('angle-save-btn');
      state.angleMeasure.active = true;
      state.angleMeasure.max = 0;
      state.angleMeasure.current = 0;

      angleListener = function(e) {
        // beta is front-to-back tilt; gamma is left-to-right
        // When phone is flat on shin, beta represents the knee extension angle
        // 0° = flat horizontal, +90° = pointing up, -90° = pointing down
        var beta = e.beta;
        if (beta === null || beta === undefined) return;
        var angle = Math.abs(beta);
        // For slump test: shin at 90° flexion = phone vertical = beta ~90°
        // As knee extends toward straight, phone tilts toward horizontal = beta ~0°
        // Standard convention: SLR angle = 90 - beta (so straight leg = 90°)
        // Actually for sitting slump knee extension, we measure how close to horizontal
        // Most clinical: knee extension angle from 90° flexed position
        // If phone starts vertical (knee at 90°) beta=90, as leg extends beta drops toward 0
        // The "knee extension angle" = 90 - beta (so at full extension, angle = 90°)
        var kneeAngle = Math.round(90 - angle);
        if (kneeAngle < 0) kneeAngle = 0;
        if (kneeAngle > 90) kneeAngle = 90;
        state.angleMeasure.current = kneeAngle;
        if (kneeAngle > state.angleMeasure.max) state.angleMeasure.max = kneeAngle;
        if (display) display.textContent = state.angleMeasure.max + '°';
      };
      window.addEventListener('deviceorientation', angleListener);

      var startBtn = document.getElementById('angle-start-btn');
      if (startBtn) startBtn.style.display = 'none';
      var permBtn = document.getElementById('angle-permission-btn');
      if (permBtn) permBtn.style.display = 'none';
      if (saveBtn) saveBtn.style.display = 'block';
    }

    var permBtn = document.getElementById('angle-permission-btn');
    if (permBtn) {
      permBtn.addEventListener('click', function() {
        DeviceOrientationEvent.requestPermission().then(function(response) {
          if (response === 'granted') {
            startListening();
          } else {
            alert('Motion access denied. You can still enter the angle manually.');
          }
        }).catch(function(err) {
          alert('Could not request motion access: ' + err.message);
        });
      });
    }

    var startBtn = document.getElementById('angle-start-btn');
    if (startBtn) startBtn.addEventListener('click', startListening);

    var saveBtn = document.getElementById('angle-save-btn');
    if (saveBtn) {
      saveBtn.addEventListener('click', function() {
        var angle = state.angleMeasure.max;
        cleanup();
        saveAngleMeasurement(angle);
      });
    }

    var manualSaveBtn = document.getElementById('angle-manual-save-btn');
    if (manualSaveBtn) {
      manualSaveBtn.addEventListener('click', function() {
        var val = document.getElementById('angle-manual').value;
        if (!val) return;
        cleanup();
        saveAngleMeasurement(parseFloat(val));
      });
    }

    var closeBtn = document.getElementById('angle-close-btn');
    if (closeBtn) closeBtn.addEventListener('click', cleanup);

    function cleanup() {
      if (angleListener) {
        window.removeEventListener('deviceorientation', angleListener);
        angleListener = null;
      }
      state.angleMeasure.active = false;
      if (modal.parentNode) document.body.removeChild(modal);
    }
  }

  function loadAngleHistory() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY_PREFIX + 'angleHistory');
      return raw ? JSON.parse(raw) : [];
    } catch (e) { return []; }
  }
  function saveAngleHistory(arr) {
    try { localStorage.setItem(STORAGE_KEY_PREFIX + 'angleHistory', JSON.stringify(arr)); } catch (e) {}
  }
  function saveAngleMeasurement(angle) {
    var hist = loadAngleHistory();
    var today = todayKey();
    var existing = hist.findIndex(function(e) { return e.date === today; });
    if (existing >= 0) {
      hist[existing].value = angle;
    } else {
      hist.push({ date: today, value: angle });
    }
    if (hist.length > 60) hist = hist.slice(-60);
    saveAngleHistory(hist);
    render();
  }

          (isActive ? '<svg viewBox="0 0 24 24" width="14" height="14" stroke="#0a0a0a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' : '') +
        '</div>' +
        '<div style="font-size: 14px; font-weight: 600; color: #fff;">' + p.label + '</div>' +
      '</div>';
    }).join('');

    modal.innerHTML =
      '<div style="background: #0a0a0a; width: 100%; max-height: 80vh; border-top-left-radius: 24px; border-top-right-radius: 24px; padding: 24px 16px 32px; overflow-y: auto; border-top: 1px solid #2a2a2a;">' +
        '<div style="width: 40px; height: 4px; background: #333; border-radius: 2px; margin: 0 auto 20px;"></div>' +
        '<div style="font-size: 11px; font-weight: 700; color: #666; letter-spacing: 1.5px; margin-bottom: 4px; text-transform: uppercase;">Select your current</div>' +
        '<h2 style="margin: 0 0 16px; font-size: 22px; font-weight: 800;">' + title + '</h2>' +
        '<div>' + phasesHTML + '</div>' +
        '<button id="phase-close-btn" style="width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px;">Close</button>' +
      '</div>';

    document.body.appendChild(modal);

    modal.querySelectorAll('[data-phase-id]').forEach(function(el) {
      el.addEventListener('click', function() {
        var newPhase = el.getAttribute('data-phase-id');
        if (isMuscleUp) state.phases.muscleUp = newPhase;
        else state.phases.hangboard = newPhase;
        savePhases(state.phases);
        document.body.removeChild(modal);
        render();
      });
    });

    document.getElementById('phase-close-btn').addEventListener('click', function() {
      document.body.removeChild(modal);
    });

    modal.addEventListener('click', function(e) {
      if (e.target === modal) document.body.removeChild(modal);
    });
  }

  // Initial render
  render();
</script>
</body>
</html>
